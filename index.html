<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="stylesheet" href="./style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>typing-quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Kalam:wght@300;400;700&family=Playwrite+IE:wght@100..400&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
    <div class="game-screen">
        <div class="main">
            <h1>
                タイピングゲーム
            </h1>
        </div>
        <div class="sub">
            <h1>
                タイピングゲーム
            </h1>
        </div>
        <div class="startbtnlist">
            <button class="startbtn">
                単語タイピング
            </button>
            <button class="startbtn2">
                タイピングクイズ
            </button>
        </div>
        <button class="mgmtbtn">
            Admin Panel
        </button>
        <button class="FBbtn" onclick="window.open('https://chatgpt.com/gg/v/69ce33405178819886422af464fa9d6f?token=3do1ahmOszR4irhPcdi9uw')">
            フィードバック
        </button>
        <button class="expbtn" onclick="window.open('https://cookies-game.github.io/Det./')">▶ 初回プレイの方は必ずここをタップ！！ ◀</button>
    </div>
    <div class="mgmt-back-screen"></div>
    <div class="mgmt-screen">
        <h3 class="mgmt">
            🔧管理パネル🔧
        </h3>
        <button class="close-btn">
            ✘
        </button>
    </div>
    <div class="typing-screen">
        <h1 class="type-word"></h1>
        <h2 class="type-roma"></h2>
        <div class="score-combo">
            <h2 class="score">スコア： 0</h2>
            <h2 class="combo">コンボ： 0</h2>
        </div>
        <h2 class="timer">残り時間： 40秒</h2>
    </div>
    <div class="result-screen">
        <div class="result-box">
            <h2 class="end-display">
                ゲーム終了！！
            </h2>
            <h2 class="result-score">
                最終スコア： <span class="finalscore">0</span>点
            </h2>
            <button class="home-btn">
                ホームに戻る
            </button>
        </div>
    </div>
    <script src="./game.js"></script>
</body>
</html>
